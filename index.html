<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7f2ea">
  <title>My Recipes</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Recipe Book</p>
      <h1>My Recipes</h1>
    </div>
    <button class="icon-button" id="refreshButton" type="button" aria-label="Refresh recipes" title="Refresh recipes">↻</button>
  </header>

  <main>
    <section class="toolbar" aria-label="Recipe tools">
      <label class="search-box">
        <span>Search</span>
        <input id="searchInput" type="search" placeholder="Search title, tag, ingredient...">
      </label>
      <div class="status-pill" id="statusMessage">Loading recipes...</div>
    </section>

    <section class="recipe-grid" id="recipeList" aria-live="polite"></section>
    <section class="empty-state" id="emptyState" hidden>
      <h2>No recipes found</h2>
      <p>Try a different search or add a new recipe.</p>
    </section>
  </main>

  <button class="fab" id="addRecipeButton" type="button" aria-label="Add recipe" title="Add recipe">+</button>

  <dialog class="modal" id="detailModal">
    <div class="modal-header">
      <button class="text-button" id="closeDetailButton" type="button">Close</button>
      <div class="modal-actions">
        <button class="text-button" id="editRecipeButton" type="button">Edit</button>
        <button class="danger-button" id="deleteRecipeButton" type="button">Delete</button>
      </div>
    </div>
    <article class="modal-body" id="recipeDetail"></article>
  </dialog>

  <dialog class="modal" id="formModal">
    <form class="recipe-form" id="recipeForm">
      <div class="modal-header">
        <button class="text-button" id="cancelFormButton" type="button">Cancel</button>
        <h2 id="formTitle">New Recipe</h2>
        <button class="text-button strong" type="submit">Save</button>
      </div>

      <div class="form-body">
        <label>
          Title
          <input id="titleInput" name="title" type="text" required placeholder="Baked Cottage Cheese Protein Blocks">
        </label>

        <label>
          Tags
          <input id="tagsInput" name="tags" type="text" placeholder="High Protein, Vegetarian">
        </label>

        <label>
          Time
          <input id="timeInput" name="time" type="text" placeholder="30 minutes">
        </label>

        <label>
          Ingredients
          <textarea id="ingredientsInput" name="ingredients" required placeholder="2 cups cottage cheese&#10;Greek yogurt"></textarea>
        </label>

        <label>
          Instructions
          <textarea id="instructionsInput" name="instructions" required placeholder="Blend ingredients&#10;Bake"></textarea>
        </label>

        <label>
          Notes
          <textarea id="notesInput" name="notes" placeholder="Meal prep friendly"></textarea>
        </label>
      </div>
    </form>
  </dialog>
</body>
</html>
