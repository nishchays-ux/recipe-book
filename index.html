<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#271712">
  <title>Recipe Book - Yashvi and Nishchay</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <div class="book-shell">
    <aside class="book-cover" aria-label="Recipe book cover">
      <div class="cover-stamp">Family Kitchen</div>
      <div>
        <p class="cover-kicker">Handwritten Favorites</p>
        <h1>Recipe Book</h1>
        <p class="cover-names">Yashvi &amp; Nishchay</p>
      </div>
      <button class="cover-add-button" id="addRecipeButton" type="button">Add Recipe</button>
    </aside>

    <main class="book-pages">
      <header class="page-header">
        <div>
          <p class="eyebrow">Recipe Book - Yashvi and Nishchay</p>
          <h2>Table of Contents</h2>
        </div>
        <button class="icon-button" id="refreshButton" type="button" aria-label="Refresh recipes" title="Refresh recipes">Refresh</button>
      </header>

      <section class="toolbar" aria-label="Recipe tools">
        <label class="search-box">
          <span>Search the book</span>
          <input id="searchInput" type="search" placeholder="Search title, tag, ingredient...">
        </label>
        <div class="status-pill" id="statusMessage">Loading recipes...</div>
      </section>

      <section class="recipe-grid" id="recipeList" aria-live="polite"></section>
      <section class="empty-state" id="emptyState" hidden>
        <h2>No recipes found</h2>
        <p>Try a different search or add a new page to the book.</p>
      </section>
    </main>
  </div>

  <dialog class="modal detail-modal" id="detailModal">
    <div class="modal-header">
      <button class="text-button" id="closeDetailButton" type="button">Close</button>
      <div class="modal-actions">
        <button class="primary-button small" id="editRecipeButton" type="button">Update Recipe</button>
        <button class="danger-button" id="deleteRecipeButton" type="button">Delete</button>
      </div>
    </div>
    <article class="modal-body" id="recipeDetail"></article>
  </dialog>

  <dialog class="modal" id="formModal">
    <form class="recipe-form" id="recipeForm">
      <div class="modal-header">
        <button class="text-button" id="cancelFormButton" type="button">Cancel</button>
        <h2 id="formTitle">New Recipe</h2>
        <button class="primary-button small" type="submit">Save</button>
      </div>

      <div class="form-body">
        <div class="field-grid">
          <label>
            Title
            <input id="titleInput" name="title" type="text" required placeholder="Baked Cottage Cheese Protein Blocks">
          </label>

          <label>
            Time
            <input id="timeInput" name="time" type="text" placeholder="30 minutes">
          </label>
        </div>

        <label>
          Tags
          <input id="tagsInput" name="tags" type="text" placeholder="High Protein, Vegetarian">
        </label>

        <section class="item-editor" aria-labelledby="ingredientsLabel">
          <div class="item-editor-header">
            <h3 id="ingredientsLabel">Ingredients</h3>
            <span>Add one at a time</span>
          </div>
          <div class="item-entry">
            <input id="ingredientInput" type="text" placeholder="2 cups cottage cheese">
            <button class="secondary-button" id="addIngredientButton" type="button">Add</button>
          </div>
          <ol class="item-list" id="ingredientsList"></ol>
        </section>

        <section class="item-editor" aria-labelledby="stepsLabel">
          <div class="item-editor-header">
            <h3 id="stepsLabel">Steps</h3>
            <span>Add one at a time</span>
          </div>
          <div class="item-entry">
            <input id="stepInput" type="text" placeholder="Blend ingredients">
            <button class="secondary-button" id="addStepButton" type="button">Add</button>
          </div>
          <ol class="item-list numbered" id="stepsList"></ol>
        </section>

        <label>
          Notes
          <textarea id="notesInput" name="notes" placeholder="Meal prep friendly"></textarea>
        </label>
      </div>
    </form>
  </dialog>
</body>
</html>
