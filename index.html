<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>My Recipes</title>
    <style>
        :root {
            --primary: #007aff;
            --bg: #f2f2f7;
            --card: #ffffff;
            --text: #1c1c1e;
            --subtext: #8e8e93;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased; padding-bottom: 80px;
        }
        .header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px 20px 15px;
            position: sticky; top: 0; z-index: 10;
            border-bottom: 1px solid #e5e5ea;
        }
        .title { margin: 0 0 15px 0; font-size: 28px; font-weight: 700; }
        .search-bar {
            width: 100%; padding: 12px 15px;
            border: none; border-radius: 10px;
            background: #e3e3e8; font-size: 16px;
            box-sizing: border-box; outline: none;
        }
        .container { padding: 15px; }
        .recipe-card {
            background: var(--card); padding: 18px;
            border-radius: 16px; margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            cursor: pointer; transition: transform 0.1s;
        }
        .recipe-card:active { transform: scale(0.98); }
        .recipe-title { margin: 0 0 8px 0; font-size: 18px; font-weight: 600; }
        .tag {
            display: inline-block; background: #e5f1ff; color: var(--primary);
            padding: 4px 8px; border-radius: 6px; font-size: 12px;
            margin-right: 6px; margin-bottom: 6px; font-weight: 500;
        }
        
        /* Full Screen Views */
        .fullscreen-view {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg); z-index: 20;
            overflow-y: auto; padding: 0;
        }
        .view-header {
            background: var(--card); padding: 40px 20px 15px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #e5e5ea; position: sticky; top: 0;
        }
        .btn-text {
            background: none; border: none; color: var(--primary);
            font-size: 17px; padding: 0; cursor: pointer; font-weight: 500;
        }
        .content-area { padding: 20px; background: var(--card); min-height: 100vh;}
        
        /* Typography inside recipe */
        .content-area h3 { margin-top: 25px; margin-bottom: 10px; font-size: 18px;}
        .content-area ul, .content-area ol { padding-left: 20px; color: #3a3a3c; line-height: 1.5;}
        .content-area li { margin-bottom: 8px; }

        /* Floating Action Button */
        .fab {
            position: fixed; bottom: 30px; right: 20px;
            width: 56px; height: 56px; border-radius: 28px;
            background: var(--primary); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.4);
            border: none; cursor: pointer; z-index: 15;
        }

        /* Form Styles */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; color: var(--subtext);}
        .form-input {
            width: 100%; padding: 12px; border: 1px solid #d1d1d6;
            border-radius: 8px; font-size: 16px; box-sizing: border-box;
            font-family: inherit;
        }
        textarea.form-input { height: 80px; resize: none; }
        .save-btn {
            width: 100%; padding: 15px; background: var(--primary);
            color: white; border: none; border-radius: 10px;
            font-size: 17px; font-weight: 600; margin-top: 10px; cursor: pointer;
        }

        /* Sync Modal */
        .sync-alert {
            display: none; background: #e5f1ff; padding: 15px;
            border-radius: 10px; margin-bottom: 20px; border: 1px solid #b3d7ff;
        }
    </style>
</head>
<body>

    <!-- Main List View -->
    <div id="listView">
        <div class="header">
            <h1 class="title">My Recipes</h1>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search recipes...">
        </div>
        <div class="container" id="recipeList">
            <!-- Cards inject here -->
        </div>
        <button class="fab" onclick="openAddForm()">+</button>
    </div>

    <!-- Single Recipe View -->
    <div id="recipeView" class="fullscreen-view">
        <div class="view-header">
            <button class="btn-text" onclick="closeViews()">‹ Back</button>
        </div>
        <div class="content-area" id="recipeContent"></div>
    </div>

    <!-- Add Recipe Form View -->
    <div id="addView" class="fullscreen-view">
        <div class="view-header">
            <button class="btn-text" onclick="closeViews()">Cancel</button>
            <span style="font-weight: 600; font-size: 17px;">New Recipe</span>
            <span style="width: 50px;"></span> <!-- Spacer for alignment -->
        </div>
        <div class="content-area">
            
            <div id="syncAlert" class="sync-alert">
                <p style="margin-top:0; font-size:14px;"><strong>Saved locally!</strong> To sync across devices, copy this code and paste it into your Git repo's JSON array.</p>
                <textarea id="jsonOutput" class="form-input" readonly style="height: 100px; font-family: monospace; font-size: 12px;"></textarea>
                <button onclick="copyJson()" class="save-btn" style="padding: 10px; margin-top: 10px; font-size: 14px;">Copy JSON Code</button>
            </div>

            <form id="addRecipeForm" onsubmit="saveRecipe(event)">
                <div class="form-group">
                    <label>Recipe Title</label>
                    <input type="text" id="f_title" class="form-input" required placeholder="e.g., Protein Oats">
                </div>
                <div class="form-group">
                    <label>Tags (comma separated)</label>
                    <input type="text" id="f_tags" class="form-input" placeholder="Vegetarian, Breakfast">
                </div>
                <div class="form-group">
                    <label>Prep/Cook Time</label>
                    <input type="text" id="f_time" class="form-input" placeholder="15 minutes">
                </div>
                <div class="form-group">
                    <label>Ingredients (one per line)</label>
                    <textarea id="f_ingredients" class="form-input" required placeholder="1 cup oats&#10;1 scoop whey"></textarea>
                </div>
                <div class="form-group">
                    <label>Instructions (one per line)</label>
                    <textarea id="f_instructions" class="form-input" required placeholder="Mix in a bowl.&#10;Eat immediately."></textarea>
                </div>
                <button type="submit" class="save-btn">Save to Phone</button>
            </form>
        </div>
    </div>

    <script>
        // --- BASE DATABASE (Git Repo Data) ---
        const gitRecipes = [
            {
                id: 1,
                title: "Baked Cottage Cheese Protein Blocks",
                tags: ["Vegetarian", "High-Protein", "Meal Prep"],
                time: "30 minutes",
                ingredients: ["2 cups low-fat cottage cheese", "1/2 cup Greek yogurt", "Spices to taste"],
                instructions: ["Preheat oven to 180°C.", "Blend the cottage cheese and Greek yogurt until smooth.", "Bake for 25 minutes."],
                notes: "An egg-free, high-protein alternative to baked paneer."
            }
        ];

        // --- APP LOGIC ---
        let allRecipes = [];

        function loadRecipes() {
            // Load custom recipes from Phone Storage
            const localStored = JSON.parse(localStorage.getItem('myCustomRecipes')) || [];
            // Combine Git recipes and Local recipes
            allRecipes = [...gitRecipes, ...localStored];
            renderList();
        }

        const recipeListEl = document.getElementById('recipeList');
        const searchInput = document.getElementById('searchInput');

        function renderList(filterText = "") {
            recipeListEl.innerHTML = "";
            const filtered = allRecipes.filter(r => 
                r.title.toLowerCase().includes(filterText.toLowerCase()) || 
                r.tags.some(tag => tag.toLowerCase().includes(filterText.toLowerCase()))
            );

            filtered.forEach(recipe => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                card.onclick = () => openRecipe(recipe);
                
                let tagsHtml = recipe.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
                
                card.innerHTML = `
                    <h3 class="recipe-title">${recipe.title}</h3>
                    <div>${tagsHtml}</div>
                `;
                recipeListEl.appendChild(card);
            });
        }

        function openRecipe(recipe) {
            let tagsHtml = recipe.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            let ingredientsHtml = recipe.ingredients.map(ing => `<li>${ing}</li>`).join('');
            let instructionsHtml = recipe.instructions.map(inst => `<li>${inst}</li>`).join('');

            document.getElementById('recipeContent').innerHTML = `
                <h2 style="margin-top:0;">${recipe.title}</h2>
                <div style="margin-bottom: 15px;">${tagsHtml}</div>
                <p style="color: #8e8e93;"><strong>Time:</strong> ${recipe.time}</p>
                <h3>Ingredients</h3>
                <ul>${ingredientsHtml}</ul>
                <h3>Instructions</h3>
                <ol>${instructionsHtml}</ol>
                ${recipe.notes ? `<h3>Notes</h3><p><em>${recipe.notes}</em></p>` : ''}
            `;
            
            document.getElementById('listView').style.display = 'none';
            document.getElementById('recipeView').style.display = 'block';
            window.scrollTo(0,0);
        }

        function openAddForm() {
            document.getElementById('listView').style.display = 'none';
            document.getElementById('addView').style.display = 'block';
            document.getElementById('syncAlert').style.display = 'none';
            document.getElementById('addRecipeForm').reset();
            window.scrollTo(0,0);
        }

        function closeViews() {
            document.getElementById('recipeView').style.display = 'none';
            document.getElementById('addView').style.display = 'none';
            document.getElementById('listView').style.display = 'block';
        }

        function saveRecipe(e) {
            e.preventDefault();
            
            const newRecipe = {
                id: Date.now(),
                title: document.getElementById('f_title').value,
                tags: document.getElementById('f_tags').value.split(',').map(t => t.trim()).filter(t => t),
                time: document.getElementById('f_time').value,
                ingredients: document.getElementById('f_ingredients').value.split('\\n').map(i => i.trim()).filter(i => i),
                instructions: document.getElementById('f_instructions').value.split('\\n').map(i => i.trim()).filter(i => i)
            };

            // Save to phone storage
            const localStored = JSON.parse(localStorage.getItem('myCustomRecipes')) || [];
            localStored.push(newRecipe);
            localStorage.setItem('myCustomRecipes', JSON.stringify(localStored));

            // Reload memory and list
            loadRecipes();

            // Generate Git JSON for user to copy later
            const jsonString = JSON.stringify(newRecipe, null, 4) + ",";
            document.getElementById('jsonOutput').value = jsonString;
            document.getElementById('syncAlert').style.display = 'block';
            
            alert("Saved to phone!");
        }

        function copyJson() {
            const copyText = document.getElementById("jsonOutput");
            copyText.select();
            document.execCommand("copy");
            alert("JSON copied! You can now paste this into your index.html on GitHub to sync.");
        }

        searchInput.addEventListener('input', (e) => {
            renderList(e.target.value);
        });

        // Initialize
        loadRecipes();
    </script>
</body>
</html>
